name: Build

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle-ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Remove Maven toolchains file
        run: rm -f ~/.m2/toolchains.xml

      - name: Build
        run: ./gradlew build --no-daemon -Dorg.gradle.java.installations.auto-detect=false -Dorg.gradle.java.installations.fromEnv=JAVA_HOME

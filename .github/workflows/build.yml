name: Build

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HOME: ${{ github.workspace }}/.ci-home
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle-ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare CI home
        run: mkdir -p "$HOME/.m2"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Clean injected toolchain paths
        run: sed -i '/org\.gradle\.java\.installations/d' gradle.properties

      - name: Build
        run: ./gradlew build --no-daemon
